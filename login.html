<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --primary: #2757f5;
      --primary-dark: #1f47d4;
      --text: #253141;
      --muted: #6b7280;
      --error: #d32f2f;
      --success: #2e7d32;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, rgba(39, 87, 245, 0.15), transparent 35%),
                  radial-gradient(circle at right, rgba(16, 185, 129, 0.12), transparent 25%),
                  var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--card);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .login-card h1 {
      margin: 0 0 8px;
      font-size: 1.95rem;
      letter-spacing: -0.03em;
    }

    .login-card p.subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.65;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: rgba(39, 87, 245, 0.7);
      box-shadow: 0 0 0 4px rgba(39, 87, 245, 0.12);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .actions a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .actions a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .message {
      min-height: 22px;
      margin-top: 18px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: var(--success);
    }

    .footer {
      margin-top: 28px;
      font-size: 0.92rem;
      color: var(--muted);
      text-align: center;
    }

    .footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue to your dashboard. Enter your email and password to access your account.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" minlength="6" required />
      </div>

      <div class="actions">
        <label>
          <input type="checkbox" id="remember" name="remember" /> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Sign In</button>
      <div id="message" class="message" role="status" aria-live="polite"></div>
    </form>

    <p class="footer">Dont have an account? <a href="#">Create one</a></p>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const messageEl = document.getElementById('message');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    loginForm.addEventListener('submit', event => {
      event.preventDefault();
      const email = loginForm.email.value.trim();
      const password = loginForm.password.value.trim();

      if (!email || !password) {
        showMessage('Please enter both email and password.', 'error');
        return;
      }

      if (!email.includes('@') || email.length < 5) {
        showMessage('Please enter a valid email address.', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters long.', 'error');
        return;
      }

      showMessage('Login successful! Redirecting...', 'success');

      setTimeout(() => {
        // Replace with real redirect when integrating with backend.
        window.location.href = '#dashboard';
      }, 900);
    });
  </script>
</body>
</html>
